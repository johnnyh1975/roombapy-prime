name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: >
          Tag to release, e.g. v0.1.11a. If this tag doesn't exist yet,
          it's created at the current commit of whichever branch you
          run this against (normally main) and pushed automatically --
          you do NOT need to create it yourself first. If it already
          exists, this just (re-)runs the release for it as-is (e.g.
          to fix a release-notes typo without cutting a new version).
        required: true

jobs:
  release:
    name: Test, verify, build, and publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # No explicit `ref:` here on purpose: for a tag push, this
      # already checks out that tag by default. For a manual
      # workflow_dispatch run, this checks out whichever branch was
      # selected in the "Run workflow" dropdown (normally main) -- and
      # THAT commit is what gets tagged below, if the tag doesn't
      # already exist.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve which tag this run is releasing
        id: resolve
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: $TAG"

      # Only relevant for a manual run: a tag-push trigger means the
      # tag obviously already exists (that's what triggered this run).
      # For workflow_dispatch, create + push it now at the currently
      # checked-out commit, unless it already exists -- in which case
      # this is a re-run for an existing tag (see the input's own
      # description above), and creating it again would fail/move it,
      # so it's deliberately skipped rather than forced.
      - name: Create and push the tag if it doesn't exist yet
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "Tag '$TAG' already exists -- releasing it as-is, not moving it."
          else
            echo "Tag '$TAG' doesn't exist yet -- creating it at the current commit ($(git rev-parse HEAD))."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + test dependencies
        run: pip install -e ".[test]"

      - name: Run test suite (never release on red)
        run: pytest roombapy_prime/tests/ -v

      - name: Check README version badge + test count against actual state (never release on stale docs)
        run: python scripts/check_version_badge.py

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (never release on red)
        run: ruff check roombapy_prime examples scripts --output-format=github

      - name: Install build tooling
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel installs cleanly in an isolated venv
        run: |
          python -m venv /tmp/install-check
          /tmp/install-check/bin/pip install dist/*.whl
          /tmp/install-check/bin/python -c "import roombapy_prime; print(roombapy_prime.__version__)"

      - name: Check for a matching release-notes file
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if [ ! -f "release-notes/$TAG.md" ]; then
            echo "::error::No release-notes/$TAG.md found for this tag."
            echo "::error::Add one (matching the tag name exactly) before releasing."
            exit 1
          fi

      # Every tag on this project so far corresponds to an alpha version
      # (0.x.ya0) -- always marked as a pre-release, never promoted to a
      # full GitHub release automatically. Flip this manually (or adjust
      # this workflow) once/if this project reaches an actual beta/stable
      # milestone -- see docs/PRIME_APP_GAP_ANALYSIS_2026-07-11.md for the
      # concrete criteria discussed for that.
      - name: Create GitHub Release (marked pre-release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          prerelease: true
          body_path: release-notes/${{ steps.resolve.outputs.tag }}.md
          files: |
            dist/*.whl
            dist/*.tar.gz
