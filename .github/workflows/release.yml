name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: >
          Existing tag to release (e.g. v0.1.11a). The tag must already
          exist (git tag ... && git push --tags) -- this does NOT create
          a tag, it only lets you (re-)run the release process for one
          that's already there, e.g. after fixing a release-notes typo
          without wanting to cut a whole new version.
        required: true

jobs:
  release:
    name: Test, verify, build, and publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # On a tag push, github.ref_name is already the tag (e.g. "v0.1.11a").
      # On a manual run, github.ref_name would be the branch that was
      # selected in the "Run workflow" dropdown (e.g. "main") -- not
      # useful here, so the manually-provided tag input is used instead
      # in that case. This one step resolves either case into a single
      # "tag" output every later step can rely on.
      - name: Resolve which tag this run is releasing
        id: resolve
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: $TAG"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + test dependencies
        run: pip install -e ".[test]"

      - name: Run test suite (never release on red)
        run: pytest roombapy_prime/tests/ -v

      - name: Check README version badge + test count against actual state (never release on stale docs)
        run: python scripts/check_version_badge.py

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (never release on red)
        run: ruff check roombapy_prime examples scripts --output-format=github

      - name: Install build tooling
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel installs cleanly in an isolated venv
        run: |
          python -m venv /tmp/install-check
          /tmp/install-check/bin/pip install dist/*.whl
          /tmp/install-check/bin/python -c "import roombapy_prime; print(roombapy_prime.__version__)"

      - name: Check for a matching release-notes file
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if [ ! -f "release-notes/$TAG.md" ]; then
            echo "::error::No release-notes/$TAG.md found for this tag."
            echo "::error::Add one (matching the tag name exactly) before tagging a release."
            exit 1
          fi

      # Every tag on this project so far corresponds to an alpha version
      # (0.x.ya0) -- always marked as a pre-release, never promoted to a
      # full GitHub release automatically. Flip this manually (or adjust
      # this workflow) once/if this project reaches an actual beta/stable
      # milestone -- see docs/PRIME_APP_GAP_ANALYSIS_2026-07-11.md for the
      # concrete criteria discussed for that.
      #
      # tag_name/body_path both use the resolved tag from above, not
      # github.ref_name directly -- required so this also works correctly
      # when manually triggered (see the resolve step's own comment).
      - name: Create GitHub Release (marked pre-release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          prerelease: true
          body_path: release-notes/${{ steps.resolve.outputs.tag }}.md
          files: |
            dist/*.whl
            dist/*.tar.gz
